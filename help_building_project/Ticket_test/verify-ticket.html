<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Vé</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Xác Thực Vé Sự Kiện</h1>
</header>
<main>
    <section id="verify-ticket">
        <h2>Nhập Mã Vé Của Bạn</h2>
        <form action="ticket-status.html" method="post">
            <label for="ticket-code">Mã Vé:</label>
            <input type="text" id="ticket-code" name="ticket-code" required><br><br>

            <button type="submit">Xác Thực</button>
        </form>
    </section>
</main>
</body>
</html>
