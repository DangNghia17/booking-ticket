<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mua Vé</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Mua Vé Sự Kiện</h1>
</header>
<main>
    <section id="buy-ticket-form">
        <h2>Nhập Thông Tin Của Bạn</h2>
        <form action="confirm-ticket.html" method="post">
            <label for="name">Tên:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="ticket-quantity">Số lượng vé:</label>
            <input type="number" id="ticket-quantity" name="ticket-quantity" value="1" min="1"><br><br>

            <button type="submit">Thanh Toán</button>
        </form>
    </section>
</main>
</body>
</html>
